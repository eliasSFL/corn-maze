# Deploy Hide and Seek (Bumpkin Hunter) static build to S3 on each push to main.
name: Bumpkin Hunter deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    concurrency: bumpkin-hunter-deploy
    environment: develop
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%dT%H:%M')" >> "$GITHUB_OUTPUT"

      - name: Get the current version ref
        id: get_version
        run: echo "VERSION=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          CI: false

          VITE_PORTAL_APP: bumpkin-hunter
          VITE_CLIENT_VERSION: ${{ steps.date.outputs.date }}
          VITE_RELEASE_VERSION: ${{ steps.get_version.outputs.VERSION }}
          VITE_IMAGE_BASE_URL: https://sunflower-land.com/game-assets
          VITE_API_URL: https://api-dev.sunflower-land.com
          VITE_PORTAL_GAME_URL: https://sunflower-land.com/testnet/
          VITE_ANIMATION_URL: https://animations-dev.sunflower-land.com/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEPLOY_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEPLOY_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Deploy static site to S3 subdomain
        run: aws s3 sync ./dist/ s3://sfl-minigames/bumpkin-hunter.minigames.sunflower-land.com/ --delete
